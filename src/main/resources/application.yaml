server:
  port: ${PORT:8080}

spring:
  application:
    name: contact-service

  datasource:
    url: "jdbc:postgresql://ep-lingering-wind-a1avid0n-pooler.ap-southeast-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require"
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
      show-sql: true
brevo:
  api:
    key: ${BREVO_API_KEY}
    url: https://api.brevo.com/v3/smtp/email
    sender-email: ${BREVO_SENDER_EMAIL}
    sender-name: ${BREVO_SENDER_NAME}
  owner-email: ${BREVO_OWNER_EMAIL}
  debug: ${BREVO_DEBUG:false}
## Owner (recipient) is dynamic per submission and comes from the submitter's email; no default configured here.