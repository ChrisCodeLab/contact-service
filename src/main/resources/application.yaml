server:
  port: ${PORT:8080}

spring:
  application:
    name: contact-service

  datasource:
    url: "jdbc:postgresql://ep-lingering-wind-a1avid0n-pooler.ap-southeast-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require"
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
    default-encoding: UTF-8
contact:
  owner:
    email: ${MAIL_USERNAME}